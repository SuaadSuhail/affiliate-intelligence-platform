services:
  postgres:
    image: postgres:16-alpine
    container_name: aip_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-affiliate_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-aip_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aip_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aip_user} -d ${POSTGRES_DB:-affiliate_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
  chromadb:
    image: chromadb/chroma:latest
    container_name: aip_chromadb
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aip_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-aip_user}:${POSTGRES_PASSWORD:-aip_secret}@postgres:5432/${POSTGRES_DB:-affiliate_intelligence}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_ENV=${APP_ENV:-production}
      - API_SECRET_KEY=${API_SECRET_KEY:-change-me-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080}
      - POSTGRES_USER=${POSTGRES_USER:-aip_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aip_secret}
      - POSTGRES_DB=${POSTGRES_DB:-affiliate_intelligence}
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8080 --reload
volumes:
  postgres_data:
  chroma_data:
